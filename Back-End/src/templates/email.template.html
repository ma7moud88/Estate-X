<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Verification</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f7fa; font-family: Arial, Helvetica, sans-serif;">
  <table width="100%" cellspacing="0" cellpadding="0" bgcolor="#f5f7fa" style="padding: 20px;">
    <tr>
      <td align="center">
        <table width="600" cellspacing="0" cellpadding="0" bgcolor="#ffffff" style="border-radius: 8px; overflow:hidden;">
          <tr>
            <td style="background:#4f46e5; padding: 20px; text-align: center; color:#fff;">
              <h2 style="margin:0; font-size: 22px;">Verify Your Email</h2>
            </td>
          </tr>
          <tr>
            <td style="padding: 30px; color:#333; font-size: 15px;">
              <p>Hi <strong>{{username}}</strong>,</p>
              <p>Thanks for signing up! Please use the verification code below to confirm your email address:</p>
              
              <p style="font-size: 26px; font-weight: bold; letter-spacing: 4px; text-align: center; margin: 30px 0; color:#4f46e5;">
                {{verification_code}}
              </p>
              
              <p>If you didn’t request this, you can safely ignore this email.</p>
              <p>Best regards,<br> The Team</p>
            </td>
          </tr>
          <tr>
            <td style="background:#f0f0f5; padding:15px; font-size:12px; color:#777; text-align:center;">
              © 2025 Your Company. All rights reserved.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
